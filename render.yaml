# Render backend deploy (Express API) — PAID plan with persistent disk.
# Frontend deploys separately on Vercel.
#
# Videos (server/uploads) and metadata (db.json) live on a persistent disk
# mounted at /data, so they survive restarts, redeploys, and idle. The app
# reads DATA_DIR to locate them (see server/index.js).
services:
  - type: web
    name: deciops-demo-api
    runtime: node
    plan: starter            # cheapest paid plan that supports a persistent disk
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: DATA_DIR
        value: /data
      - key: ADMIN_PASSWORD
        sync: false          # set in Render dashboard (do NOT commit secrets)
      - key: CORS_ORIGIN
        sync: false          # set to your frontend URL, e.g. https://demo.deciops.ai
    disk:
      name: deciops-data
      mountPath: /data       # videos + db.json persist here
      sizeGB: 10
